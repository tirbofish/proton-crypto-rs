name: docs.rs build test

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  docs-rs:
    name: docs.rs build
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: dtolnay/rust-toolchain@nightly
      - uses: dtolnay/install@cargo-docs-rs
      - run: cargo docs-rs -p proton-crypto
